const state = {};
data.forEach(sec => sec.items.forEach((item, i) => {
  const key = sec.id + '_' + i;
  item.key = key;
  state[key] = { vote: item.c ? 'yes' : null };
}));

function render() {
  const app = document.getElementById('app');
  let html = '';
  data.forEach(sec => {
    const yesCount = sec.items.filter(i => state[i.key].vote === 'yes').length;
    const total = sec.items.length;
    html += `<div class="section">`;
    html += `<div class="section-header" onclick="toggle('${sec.id}')">
      <span class="section-emoji">${sec.cat.split(' ')[0]}</span>
      <span class="section-title">${sec.cat.substring(sec.cat.indexOf(' ')+1)}</span>
      <span class="section-count">${yesCount}/${total}</span>
      <span class="section-toggle" id="arrow_${sec.id}">▶</span>
    </div>`;
    html += `<div class="section-items" id="items_${sec.id}">`;
    sec.items.forEach(item => {
      const s = state[item.key];
      const cls = item.c && s.vote === 'yes' ? 'confirmed' : s.vote === 'yes' ? 'yes' : s.vote === 'no' ? 'no' : '';
      const badge = item.c ? '<span class="confirmed-badge">already in</span>' : '';
      html += `<div class="item ${cls}">
        <div class="item-btns">
          <button class="btn btn-y ${s.vote==='yes'?'on':''}" onclick="vote('${item.key}','yes')">✓</button>
          <button class="btn btn-n ${s.vote==='no'?'on':''}" onclick="vote('${item.key}','no')">✗</button>
        </div>
        <div class="item-body">
          <span class="item-name">${item.n}</span>${badge}
          <div class="item-desc">${item.d}</div>
        </div>
      </div>`;
    });
    html += '</div></div>';
  });
  app.innerHTML = html;
  updateCounts();
  // Restore open states
  document.querySelectorAll('.section-items').forEach(el => {
    const id = el.id.replace('items_', '');
    if (openSections[id]) { el.classList.add('open'); document.getElementById('arrow_'+id).textContent = '▼'; }
  });
}

const openSections = {};
function toggle(id) {
  openSections[id] = !openSections[id];
  const el = document.getElementById('items_' + id);
  const arrow = document.getElementById('arrow_' + id);
  el.classList.toggle('open');
  arrow.textContent = el.classList.contains('open') ? '▼' : '▶';
}

function vote(key, v) {
  state[key] = { vote: state[key].vote === v ? null : v };
  render();
}

function updateCounts() {
  let y=0, n=0, p=0;
  Object.values(state).forEach(s => { if(s.vote==='yes')y++; else if(s.vote==='no')n++; else p++; });
  document.getElementById('yC').textContent = y;
  document.getElementById('nC').textContent = n;
  document.getElementById('pC').textContent = p;
}

function copySummary() {
  let text = "MY ULUWATU PICKS\n\n";
  data.forEach(sec => {
    const yes = sec.items.filter(i => state[i.key].vote === 'yes');
    if (!yes.length) return;
    text += sec.cat + "\n";
    yes.forEach(i => text += `  ✓ ${i.n}\n`);
    text += "\n";
  });
  const skipped = [];
  data.forEach(sec => sec.items.filter(i => state[i.key].vote === 'no').forEach(i => skipped.push(i.n)));
  if (skipped.length) text += "SKIPPED: " + skipped.join(", ") + "\n";
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy My Picks', 2000);
  });
}

render();
// Auto-open first section
toggle(data[0].id);
</script>
