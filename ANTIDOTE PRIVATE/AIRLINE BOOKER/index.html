    const DATA_FILE = 'booker-data.json';
    const IDB_DB    = 'arc_airline_sync';
    const IDB_STORE = 'handles';

    const Sync = {
      // Open IndexedDB
      openDB: () => new Promise((res, rej) => {
        const req = indexedDB.open(IDB_DB, 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
        req.onsuccess = e => res(e.target.result);
        req.onerror   = () => rej(new Error('IDB open failed'));
      }),

      // Retrieve stored directory handle
      loadHandle: async () => {
        try {
          const db = await Sync.openDB();
          return await new Promise((res) => {
            const tx = db.transaction(IDB_STORE, 'readonly');
            const req = tx.objectStore(IDB_STORE).get('dir');
            req.onsuccess = () => res(req.result || null);
            req.onerror   = () => res(null);
          });
        } catch { return null; }
      },

      // Persist directory handle
      saveHandle: async (handle) => {
        try {
          const db = await Sync.openDB();
          await new Promise((res, rej) => {
            const tx = db.transaction(IDB_STORE, 'readwrite');
            tx.objectStore(IDB_STORE).put(handle, 'dir');
            tx.oncomplete = res;
            tx.onerror    = rej;
          });
        } catch {}
      },

      // Ask user to pick the AIRLINE BOOKER folder
      pickFolder: async () => {
        try {
          const handle = await window.showDirectoryPicker({ mode: 'readwrite', startIn: 'documents' });
          await Sync.saveHandle(handle);
          return handle;
        } catch { return null; }
      },

      // Read booker-data.json from folder
      read: async (dirHandle) => {
        try {
          const fh   = await dirHandle.getFileHandle(DATA_FILE, { create: false });
          const file = await fh.getFile();
          return JSON.parse(await file.text());
        } catch { return null; }
      },

      // Write booker-data.json to folder
      write: async (dirHandle, data) => {
        try {
          const fh       = await dirHandle.getFileHandle(DATA_FILE, { create: true });
          const writable = await fh.createWritable();
          await writable.write(JSON.stringify(data, null, 2));
          await writable.close();
          return true;
        } catch { return false; }
      },

      // Verify we still have permission (needed after page reload)
      verify: async (handle) => {
        try {
          const perm = await handle.queryPermission({ mode: 'readwrite' });
          if (perm === 'granted') return true;
          const req = await handle.requestPermission({ mode: 'readwrite' });
          return req === 'granted';
        } catch { return false; }
      },
    };

    // ── MAIN COMPONENT ────────────────────────────────────────────────
    function AirlineBooker() {
      const [activeTab, setActiveTab] = useState(0);
      const [expandedPS, setExpandedPS] = useState("ps1");
      const [savedFlash, setSavedFlash] = useState(false);

      // ── Sync state ──
      const [syncStatus, setSyncStatus] = useState('loading'); // loading | unlinked | linked | syncing | error
      const [syncMsg, setSyncMsg]       = useState('');
      const dirHandleRef = useRef(null);
      const saveTimerRef = useRef(null);

      // ── Persisted state ──
      const [points, setPoints] = useState(() =>
        LS.get("arc_points", { amex_mr:"152184", chase_ur:"202033", ana:"", krisflyer:"", aa_adv:"63075", atmos:"110942", united:"17472", hawaiian:"" })
      );
      const [positions, setPositions] = useState(() =>
        LS.get("arc_positions", POSITION_DEFAULTS)
      );
      const [checks, setChecks] = useState(() =>
        LS.get("arc_checks", {})
      );
      const [visaStatus, setVisaStatus] = useState(() =>
        LS.get("arc_visas", { indonesia: false, australia: false })
      );
      const [notes, setNotes] = useState(() =>
        LS.get("arc_notes", "")
      );

      // ── Build data bundle ──
      const buildBundle = useCallback((p, pos, c, v, n) => ({
        version: 1, updatedAt: new Date().toISOString(),
        points: p, positions: pos, checks: c, visaStatus: v, notes: n,
      }), []);

      // ── Apply loaded bundle to state ──
      const applyBundle = (bundle) => {
        if (!bundle) return;
        if (bundle.points)     setPoints(bundle.points);
        if (bundle.positions)  setPositions(bundle.positions);
        if (bundle.checks)     setChecks(bundle.checks);
        if (bundle.visaStatus) setVisaStatus(bundle.visaStatus);
        if (bundle.notes !== undefined) setNotes(bundle.notes);
      };

      // ── Save to Dropbox (debounced) ──
      const scheduleDropboxSave = useCallback((p, pos, c, v, n) => {
        if (!dirHandleRef.current) return;
        clearTimeout(saveTimerRef.current);
        saveTimerRef.current = setTimeout(async () => {
          setSyncStatus('syncing');
          const ok = await Sync.write(dirHandleRef.current, buildBundle(p, pos, c, v, n));
          setSyncStatus(ok ? 'linked' : 'error');
          setSyncMsg(ok ? `Saved ${new Date().toLocaleTimeString()}` : 'Write failed');
        }, 800);
      }, [buildBundle]);

      // ── On mount: try to reconnect stored handle ──
      useEffect(() => {
        (async () => {
          const handle = await Sync.loadHandle();
          if (!handle) { setSyncStatus('unlinked'); return; }
          const ok = await Sync.verify(handle);
          if (!ok) { setSyncStatus('unlinked'); setSyncMsg('Permission needed — click Link Folder'); return; }
          dirHandleRef.current = handle;
          const bundle = await Sync.read(handle);
          if (bundle) {
            applyBundle(bundle);
            setSyncMsg(`Loaded from Dropbox · ${new Date(bundle.updatedAt).toLocaleString()}`);
          }
          setSyncStatus('linked');
        })();
      }, []);

      // ── Auto-save: localStorage always, Dropbox if linked ──
      useEffect(() => { LS.set("arc_points", points);     scheduleDropboxSave(points, positions, checks, visaStatus, notes); }, [points]);
      useEffect(() => { LS.set("arc_positions", positions); scheduleDropboxSave(points, positions, checks, visaStatus, notes); }, [positions]);
      useEffect(() => { LS.set("arc_checks", checks);      scheduleDropboxSave(points, positions, checks, visaStatus, notes); }, [checks]);
      useEffect(() => { LS.set("arc_visas", visaStatus);   scheduleDropboxSave(points, positions, checks, visaStatus, notes); }, [visaStatus]);
      useEffect(() => { LS.set("arc_notes", notes);        scheduleDropboxSave(points, positions, checks, visaStatus, notes); }, [notes]);

      // ── Link folder ──
      const handleLinkFolder = async () => {
        setSyncStatus('syncing'); setSyncMsg('Pick your AIRLINE BOOKER folder in Dropbox…');
        const handle = await Sync.pickFolder();
        if (!handle) { setSyncStatus('unlinked'); setSyncMsg('Cancelled'); return; }
        dirHandleRef.current = handle;
        // Try to load existing data first
        const bundle = await Sync.read(handle);
        if (bundle) {
          applyBundle(bundle);
          setSyncMsg(`Loaded existing data · ${new Date(bundle.updatedAt).toLocaleString()}`);
        } else {
          // Write current state as initial file
          await Sync.write(handle, buildBundle(points, positions, checks, visaStatus, notes));
          setSyncMsg('Dropbox folder linked · data file created');
        }
        setSyncStatus('linked');
      };

      const updatePoints = (key, val) => setPoints(p => ({ ...p, [key]: val }));
      const updatePosition = (id, field, val) =>
        setPositions(ps => ps.map(p => p.id === id ? { ...p, [field]: val } : p));
      const toggleCheck = (key) => setChecks(c => ({ ...c, [key]: !c[key] }));
      const toggleVisa  = (key) => setVisaStatus(v => ({ ...v, [key]: !v[key] }));

      const flashSaved = () => {

                            onClick={() => toggleCheck(key)}>
                            <div className={`w-5 h-5 rounded border flex-shrink-0 mt-0.5 flex items-center justify-center transition-all ${done ? "bg-emerald-500 border-emerald-400" : "border-gray-600 bg-black/20"}`}>
                              {done && <span className="text-white text-xs font-bold">✓</span>}
                            </div>
                            <div className="flex-1">
                              <div className={`text-sm ${done ? "line-through text-gray-500" : "text-gray-200"}`}>{t.task}</div>
                              <div className="text-indigo-400 font-mono text-xs mt-1">{t.tool}</div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}

                <div className="bg-gradient-to-r from-indigo-950/60 to-violet-950/60 border border-indigo-600/30 rounded-2xl p-5">
                  <h4 className="text-indigo-200 font-bold mb-2">💡 The Hedge Mindset</h4>
                  <p className="text-indigo-200/70 text-sm leading-relaxed">
                    You're not trying to predict the future — you're buying options. Register standby (free). Book an award (cancelable ~$100). If cash refundable, book that too (zero exit cost). Worst outcome: one small cancel fee. Best outcome: D1 to Tokyo for $50, Bali from there on $150. The system works because you act before you commit.
                  </p>
                </div>
              </div>
            )}

          </div>

          <div className="border-t border-white/5 bg-gray-900 px-6 py-3">
            <div className="max-w-5xl mx-auto flex justify-between flex-wrap gap-2 text-xs text-gray-600">
              <span>Airline Booker · ARC Brain · March 2026</span>
              <span>{syncStatus === 'linked' ? '☁️ Syncing to Dropbox · ' : '💾 Local only · '} Hedge Portfolio Engine v1</span>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(AirlineBooker));
  </script>
</body>
</html>
