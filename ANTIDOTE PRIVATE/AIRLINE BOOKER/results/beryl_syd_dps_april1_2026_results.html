              Two afternoon nonstops match your brief: <strong className="text-white">Qantas at 5:20 PM ($1,347)</strong> and <strong className="text-white">Jetstar at 5:25 PM ($1,322)</strong>. Only $25 apart — take Qantas for full service. If $1,300+ is too steep, consider <strong className="text-white">Batik Air at 8:35 AM ($944)</strong> to save ~$400 (but morning departure), or <strong className="text-white">Jetstar via Adelaide at 3 PM ($939)</strong> which arrives 9:40 PM Bali with a 2hr connection. Points via Chase UR portal could offset ~$900 of cash cost.
            </p>
          </div>
          {FLIGHTS.map((f, i) => <FlightCard key={i} f={f} />)}
        </div>
      );
    }

    function PointsPlays() {
      return (
        <div className="space-y-4">
          <div className="bg-blue-950/30 border border-blue-500/30 rounded-xl p-4 mb-4">
            <h3 className="text-blue-400 font-bold mb-1">💡 Points Reality Check — Updated for Real Prices</h3>
            <p className="text-gray-300 text-sm">
              At <strong className="text-white">$944–$1,347 AUD cash</strong>, points become much more compelling than at normal prices. <strong className="text-white">Chase UR portal at 1.5x</strong> would cost ~63K–90K UR points to fully cover a ticket — that's a lot of points for economy. Transfer-based awards (KrisFlyer 20% sale at ~16K–20K miles) are now <strong className="text-white">dramatically better value</strong> if Saver space exists. Even Qantas Classic Reward at 18K–23K points + $147 taxes beats paying $1,347 cash.
            </p>
          </div>
          {POINTS_PLAYS.map((pp) => (
            <div key={pp.id} className={`bg-gray-800/60 border ${pp.color} rounded-xl p-5 ${pp.glowClass}`}>
              <div className="flex items-start justify-between mb-3">
                <div>
                  <div className="flex items-center gap-2 mb-1">
                    <span className="text-white font-bold">{pp.label}</span>
                    <span className={`text-xs ${pp.badgeColor} text-white px-2 py-0.5 rounded-full font-bold`}>{pp.badgeText}</span>
                  </div>
                  <p className="text-gray-400 text-sm">{pp.tagline}</p>
                </div>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm">
                <div><span className="text-gray-500">Transfer:</span> <span className="text-gray-300">{pp.transfer}</span></div>
                <div><span className="text-gray-500">Miles needed:</span> <span className="text-emerald-400 font-medium">{pp.milesNeeded}</span></div>
                <div><span className="text-gray-500">Total cost:</span> <span className="text-white font-medium">{pp.totalCost}</span></div>
                <div><span className="text-gray-500">Value:</span> <span className="text-gray-300">{pp.centsPerPoint}</span></div>
                <div className="md:col-span-2"><span className="text-gray-500">Book on:</span> <span className="text-gray-300">{pp.bookOn}</span></div>
                {pp.partnerNote && <div className="md:col-span-2"><span className="text-gray-500">Partner note:</span> <span className="text-yellow-400/80">{pp.partnerNote}</span></div>}
                <div className="md:col-span-2"><span className="text-gray-500">Balance after:</span> <span className="text-gray-300">{pp.balanceAfter}</span></div>
              </div>
              <div className="mt-3 bg-black/30 rounded-lg p-3">
                <span className="text-gray-500 text-xs">VERDICT:</span>
                <p className="text-gray-200 text-sm mt-1">{pp.verdict}</p>
              </div>
            </div>
          ))}
        </div>
      );
    }

    function HedgePortfolio() {
      return (
        <div className="space-y-4">
          <div className="bg-indigo-950/30 border border-indigo-500/30 rounded-xl p-4 mb-2">
            <h3 className="text-indigo-400 font-bold mb-1">🎲 {HEDGE.label}</h3>
            <p className="text-gray-300 text-sm">{HEDGE.tagline}</p>
            <p className="text-gray-400 text-xs mt-2">Note: With myID overbooked and only 2 days to departure, this is a streamlined 2-position hedge, not the full 3-position portfolio used for advance bookings.</p>
          </div>

          {HEDGE.positions.map((pos, i) => (
            <div key={i} className={`bg-gray-800/60 border border-white/10 rounded-xl p-5`}>
              <div className="flex items-center gap-3 mb-3">
                <span className={`${pos.color} text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm`}>{pos.slot}</span>
                <div>
                  <div className="text-white font-bold">{pos.label}</div>
                  <div className="text-gray-400 text-xs">{pos.type.toUpperCase()} · {pos.route}</div>
                </div>
              </div>
              <p className="text-gray-300 text-sm mb-3">{pos.details}</p>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-2 text-xs">
                <div className="bg-white/5 rounded p-2"><span className="text-gray-500">Cost:</span> <span className="text-emerald-400">{pos.cost}</span></div>
                <div className="bg-white/5 rounded p-2"><span className="text-gray-500">Cancel policy:</span> <span className="text-gray-300">{pos.cancelPolicy}</span></div>
                <div className="bg-white/5 rounded p-2"><span className="text-gray-500">Cancel fee:</span> <span className="text-gray-300">{pos.cancelFee}</span></div>
                <div className="bg-white/5 rounded p-2"><span className="text-gray-500">Priority:</span> <span className="text-yellow-400">{pos.priority}</span></div>
              </div>
              <div className="mt-3 bg-indigo-950/30 rounded-lg p-3">
                <span className="text-indigo-400 text-xs font-bold">ACTION:</span>
                <p className="text-gray-200 text-sm mt-1">{pos.action}</p>
              </div>
            </div>
          ))}

          <div className="bg-gray-800/60 border border-white/10 rounded-xl p-5">
            <h3 className="text-white font-bold mb-3">🔀 Collapse Logic</h3>
            <div className="space-y-3">
              {HEDGE.collapseLogic.map((cl, i) => (
                <div key={i} className="flex gap-3 bg-black/30 rounded-lg p-3">
                  <span className="text-xl">{cl.emoji}</span>
                  <div>
                    <div className="text-gray-400 text-xs mb-1">IF: {cl.trigger}</div>
                    <div className="text-gray-200 text-sm">→ {cl.action}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function ActionPlan() {
      return (
        <div className="space-y-4">
          {ACTIONS.map((group, i) => (
            <div key={i} className="bg-gray-800/60 border border-white/10 rounded-xl p-5">
              <h3 className="text-white font-bold mb-3">{group.priority}</h3>
              <div className="space-y-2">
                {group.items.map((item, j) => (
                  <div key={j} className="flex gap-3 items-start">
                    <span className="text-gray-600 mt-0.5">▸</span>
                    <p className="text-gray-300 text-sm">{item}</p>
                  </div>
                ))}
              </div>
            </div>
          ))}

          <div className="bg-amber-950/30 border border-amber-500/30 rounded-xl p-4">
            <h3 className="text-amber-400 font-bold mb-2">⚡ Bottom Line</h3>
            <p className="text-gray-300 text-sm leading-relaxed">
              You're 2 days out and need a confirmed seat. <strong className="text-white">Book Qantas QF43 (4:25 PM, lands 8:05 PM Bali) today.</strong> If it's over AUD $450, go Jetstar JQ37 (6 PM, lands 9:20 PM). Pay via Chase UR portal for 1.5x value (~13K–20K points), or straight cash if portal pricing doesn't match. Quick check of KrisFlyer partner awards first — if there's a Saver seat on Garuda for 16K miles with the sale, that beats everything. But don't wait on it — cash is the safe play this close to departure.
            </p>
          </div>
        </div>
      );
    }

    function App() {
      const [tab, setTab] = useState(0);
      const panels = [FlightOptions, PointsPlays, HedgePortfolio, ActionPlan];
      const Panel = panels[tab];
      return (
        <div className="min-h-screen bg-gray-950 text-gray-200">
          <Header />
          <TabBar active={tab} setActive={setTab} />
          <div className="max-w-6xl mx-auto px-6 py-6">
            <Panel />
          </div>
          <div className="text-center text-gray-600 text-xs py-6 border-t border-white/5">
            AIRLINE BOOKER · SYD→DPS · Generated March 30, 2026 · Prices are indicative — verify on airline sites before booking
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
